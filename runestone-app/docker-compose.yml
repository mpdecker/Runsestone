services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-runestone}
      POSTGRES_USER: ${POSTGRES_USER:-runestone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runestone}
    ports:
      - "${POSTGRES_PORT:-5442}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runestone} -d ${POSTGRES_DB:-runestone}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/runestone}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474"
      - "${NEO4J_BOLT_PORT:-7688}:7687"
    volumes:
      - neo4jdata:/data
      - neo4jplugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollamadata:/root/.ollama
    profiles:
      - ai
    restart: unless-stopped

  runestone-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${RUNESTONE_SERVER_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-runestone}:${POSTGRES_PASSWORD:-runestone}@postgres:5432/${POSTGRES_DB:-runestone}
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: runestone
      RUNESTONE_API_TOKEN: ${RUNESTONE_API_TOKEN:-runestone-dev-token}
      RUNESTONE_SERVER_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  neo4jplugins:
  ollamadata:
